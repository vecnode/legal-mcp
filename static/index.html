<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>legal atlas</title>
  <link rel="icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <header>
    <h1>legal-atlas</h1>
    AI-assisted platform to understand and create legal documents
  </header>

  <main>
    <div class="main-container">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="text-extractor">Text Extractor</button>
        <button class="tab-btn" data-tab="legal-generator">Legal Document Generator</button>
      </div>
      
      <div class="tab-content active" id="text-extractor">
        
        <section class="card glossary-card">
          About
          <br><br>
          <label>This page allows to extract text from PDFs and Images.<br> 
            This section currently allows to: 1) Extract text from PDF/Image, 2) Visualise PDFs/Image, 3) Download and copy the text extracted.</label>
        </section>

        <section class="card">
          File Upload

          <form id="form">  
            <div class="drop-area" id="drop">
              <input id="fileInput" type="file" accept="application/pdf,image/*" />
              <div id="fileLabel">Drop or Click to upload PDFs or Images</div>
              <div id="fileMeta"></div>
              <div id="fileType" class="file-type"></div>
            </div>

             <div>
               <label>Selected File</label>
               <div id="selectedFile" class="file-info"></div>
             </div>

             <div>
               <label>File Type</label>
               <div id="fileSize" class="file-info"></div>
             </div>

            <div class="row">
              <button class="btn" id="runBtn" type="submit">Extract text</button>
              <button class="btn" id="clearBtn" type="button">Clear Files</button>

            </div>

            
            <div class="space"></div>
            <div class="muted" id="status"></div>
          </form>

        </section>

        <section class="card">
          Document Visualiser
          <div id="pdfPreview" class="pdf-preview">
            <p class="muted">File Preview</p>
          </div>
        </section>

        <section class="card results-card">
          Extraction Results 
          <br>
          <div class="row">
            <button class="btn" id="downloadBtn" type="button" disabled>Download .txt</button>
            <button class="btn" id="copyBtn" type="button" disabled>Copy text</button>
          </div>
          <br>
          <textarea id="output" class="results" readonly></textarea>
        </section>
      
       
      </div>

      
      <div class="tab-content" id="legal-generator">
        
        <section class="card glossary-card">
          About
          <br><br>
          <label>This page allows you to process text using AI.<br> 
            You can analyze, summarize, or extract key points from any text using OpenAI's API.</label>
        </section>

        <section class="card">
          Text Processing
          <br>
          <textarea id="inputText" class="input-text" placeholder="Paste your text here"></textarea>
          
          <div class="row">
            Processing Task:
            <select id="taskSelect">
              <option value="analyze">Analyze</option>
              <option value="summarize">Summarize</option>
              <option value="extract_key_points">Extract Key Points</option>
            </select>
          </div>
          
          <div class="row">
            Language:
            <select id="languageSelect">
              <option value="english">English</option>
              <option value="portuguese">Portuguese (PT)</option>
            </select>
          </div>
          
          <div class="row">
            <button class="btn" id="processBtn" type="button">Process with AI</button>
            <button class="btn" id="clearTextBtn" type="button">Clear Text</button>
          </div>
          
          <div class="space"></div>
          <div class="muted" id="processStatus"></div>
        </section>

        <section class="card results-card">
          AI Results
          <br>
          <div class="row">
            <button class="btn" id="downloadProcessedBtn" type="button" disabled>Download .txt</button>
            <button class="btn" id="copyProcessedBtn" type="button" disabled>Copy text</button>
          </div>
          <br>
          <textarea id="processedOutput" class="results" readonly></textarea>
        </section>
        
      </div>

    </div>
  </main>

  

  <script src="/static/api.js"></script>
  <script src="/static/script.js"></script>
</body>
</html>
